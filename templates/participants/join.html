{% extends "base.html" %}

{% block content %}

<h2>Join Contest</h2>

<h3>{{contest.title}}</h3>

<form method="POST">

{% csrf_token %}

<label>Name</label>
<br>
<input type="text" name="name" required>
<br><br>

<label>Email</label>
<br>
<input type="email" name="email" required>
<br><br>

<button type="submit">Join Contest</button>

</form>

{% endblock %}
