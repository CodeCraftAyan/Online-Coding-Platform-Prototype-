{% extends "base.html" %}

{% block content %}

<h2>Scoreboard</h2>

<table>

<tr>
<th>Rank</th>
<th>Participant</th>
<th>Solved</th>
</tr>

{% for row in scoreboard %}

<tr>

<td>{{forloop.counter}}</td>

<td>{{row.name}}</td>

<td>{{row.solved}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
