<!DOCTYPE html>
<html>
<head>

<title>Online Judge</title>

<style>

body{
    font-family: Arial;
    margin:40px;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:20px;
    border-radius:8px;
}

.navbar{
    background:#222;
    padding:12px;
    border-radius:6px;
    margin-bottom:20px;
}

.navbar a{
    color:white;
    margin-right:20px;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    text-decoration:underline;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#eee;
}

textarea{
    width:100%;
    height:300px;
    font-family: monospace;
}

</style>

</head>

<body>
<!-- <h1>Hello</h1> -->
<div class="navbar">

    <a href="/">Contests</a>

    <a onclick="window.history.back()" style="cursor: pointer;">Go Back</a>

</div>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
